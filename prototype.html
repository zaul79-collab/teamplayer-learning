<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>팀플레이어 — 학습 도구 V2</title>
<style>
/* ============================================================
   팀플레이어 학습 도구 V2 — Warm Editorial
   2026-06-12 전면 리디자인 · 케이옥션 IT팀
   ============================================================ */
:root{
  /* 뉴트럴 — 웜 페이퍼 */
  --bg:#F4F1EA;
  --card:#FFFFFF;
  --ink:#201D18;        /* 본문 강조 + Primary 버튼 */
  --sub:#6F6A5F;        /* 보조 본문 */
  --faint:#A8A294;      /* 캡션/레이블 */
  --line:#E6E1D5;       /* 테두리 */
  --wash:#ECE8DE;       /* 세그먼트/스케일 베이스 */

  /* 덕목 — 겸손(h) · 갈망(g) · 영리함(s) : 시맨틱 색상 유지 */
  --h:#F59E0B;  --h-bg:#FBF3E2;  --h-dark:#8A5A00;
  --g:#2563EB;  --g-bg:#E9F0FD;  --g-dark:#1E3A8A;
  --s:#16A34A;  --s-bg:#E8F6EC;  --s-dark:#14532D;

  /* 상태 */
  --ok:#16A34A; --ok-bg:#E8F6EC;
  --bad:#DC2626; --bad-bg:#FDEDED;

  /* 형태 */
  --r:20px; --r-sm:12px;
  --shadow:0 1px 2px rgba(32,29,24,.04), 0 8px 28px -10px rgba(32,29,24,.14);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:Pretendard,-apple-system,"Apple SD Gothic Neo","맑은 고딕",sans-serif;
  background:#E9E5DC; color:var(--ink); line-height:1.55;
  display:flex; justify-content:center; min-height:100vh;
}
.app{
  width:100%; max-width:430px; min-height:100vh; position:relative;
  background:var(--bg); overflow-x:hidden;
  box-shadow:0 0 60px rgba(32,29,24,.12);
}

/* ---------- 공통 ---------- */
.screen{display:none; padding:20px 18px 120px; animation:fadeIn .22s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.eyebrow{font-size:11px;font-weight:800;letter-spacing:.14em;color:var(--faint);text-transform:uppercase}
.h1{font-size:24px;font-weight:800;letter-spacing:-.02em;line-height:1.25}
.h2{font-size:17px;font-weight:800;letter-spacing:-.01em}
.cap{font-size:12px;color:var(--faint);font-weight:600}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}

.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;
  padding:15px 18px;border:none;border-radius:999px;font-family:inherit;
  font-size:15px;font-weight:700;cursor:pointer;transition:transform .12s ease,opacity .15s}
.btn:active{transform:scale(.97)}
.btn-ink{background:var(--ink);color:#fff}
.btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line)}
.btn-h{background:var(--h);color:#fff}
.btn-g{background:var(--g);color:#fff}
.btn-s{background:var(--s);color:#fff}
.btn-sm{padding:11px 16px;font-size:13.5px}

.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;
  padding:4px 11px;border-radius:999px;letter-spacing:.02em}
.badge-h{background:var(--h-bg);color:var(--h-dark)}
.badge-g{background:var(--g-bg);color:var(--g-dark)}
.badge-s{background:var(--s-bg);color:var(--s-dark)}
.badge-ink{background:var(--ink);color:#fff}
.badge-line{background:transparent;border:1px solid var(--line);color:var(--faint)}

/* ---------- 바텀 내비 (플로팅 필) ---------- */
.nav{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  width:calc(100% - 36px);max-width:394px;z-index:40;
  display:flex;justify-content:space-between;padding:7px;
  background:rgba(255,255,255,.82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(230,225,213,.9);border-radius:999px;
  box-shadow:0 10px 34px -8px rgba(32,29,24,.22);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 0;border-radius:999px;cursor:pointer;color:var(--faint);
  font-size:10px;font-weight:700;transition:all .18s ease;
}
.nav-item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-item.on{background:var(--ink);color:#fff}

/* ---------- 홈 ---------- */
.home-top{display:flex;justify-content:space-between;align-items:flex-start;margin:6px 2px 18px}
.hero{
  position:relative;border-radius:26px;overflow:hidden;background:var(--ink);
  color:#fff;padding:26px 22px;margin-bottom:14px;
}
.hero .orb{position:absolute;border-radius:50%;filter:blur(34px);opacity:.5;pointer-events:none}
.hero-num{font-size:46px;font-weight:900;letter-spacing:-.03em;line-height:1}
.hero-bar{height:6px;background:rgba(255,255,255,.16);border-radius:99px;margin-top:16px;overflow:hidden}
.hero-bar i{display:block;height:100%;border-radius:99px;background:#fff;transition:width .5s cubic-bezier(.22,.9,.3,1)}
.vrow{display:flex;gap:10px;margin-bottom:14px}
.vstat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px 13px}
.vstat .n{font-size:21px;font-weight:900;letter-spacing:-.02em}
.vstat .bar{height:4px;border-radius:99px;background:var(--wash);margin-top:9px;overflow:hidden}
.vstat .bar i{display:block;height:100%;border-radius:99px;transition:width .5s}
.next-card{display:flex;align-items:center;gap:14px;padding:17px 18px;cursor:pointer}
.next-emoji{width:48px;height:48px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:23px;flex-shrink:0}
.reset-link{display:block;text-align:center;margin-top:26px;font-size:12px;color:var(--faint);
  background:none;border:none;font-family:inherit;cursor:pointer;text-decoration:underline;width:100%}

/* ---------- 모듈 목록 ---------- */
.vsec{margin-bottom:22px}
.vsec-head{display:flex;align-items:center;gap:9px;margin:0 2px 10px}
.vsec-bar{width:4px;height:16px;border-radius:99px}
.mod-card{display:flex;align-items:center;gap:13px;padding:15px 16px;margin-bottom:9px;cursor:pointer;transition:transform .12s}
.mod-card:active{transform:scale(.98)}
.mod-card.locked{opacity:.45}
.mod-emoji{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.mod-meta{flex:1;min-width:0}
.mod-n{font-size:10.5px;font-weight:800;letter-spacing:.1em;color:var(--faint)}
.mod-t{font-size:14.5px;font-weight:700;letter-spacing:-.01em;margin-top:1px}
.mod-state{font-size:11px;font-weight:700;margin-top:3px}
.chev{color:var(--faint);font-size:16px;flex-shrink:0}

/* ---------- 모듈 상세 (슬라이드인) ---------- */
#s-module{
  visibility:hidden;pointer-events:none;
  position:fixed;inset:0;z-index:60;margin:0 auto;max-width:430px;
  background:var(--bg);transform:translateX(100%);
  transition:transform .3s cubic-bezier(.22,.9,.3,1), visibility 0s linear .3s;
  overflow-y:auto;padding:0 0 60px;
}
#s-module.in{
  visibility:visible;pointer-events:auto;
  transform:translateX(0);
  transition:transform .3s cubic-bezier(.22,.9,.3,1), visibility 0s linear 0s;
}
.md-head{
  position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:10px;
  padding:14px 16px;background:rgba(244,241,234,.88);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}
.back-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:var(--card);
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--ink);flex-shrink:0}
.md-hero{padding:24px 20px 4px}
.md-hero-emoji{width:58px;height:58px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:13px}
.obj-card{margin:16px 18px 0;padding:16px 17px}
.obj-item{display:flex;gap:9px;font-size:13.5px;color:var(--sub);margin-top:8px;line-height:1.5}
.obj-item b{color:inherit}
.obj-check{flex-shrink:0;font-weight:900}

/* 세그먼트 탭 */
.seg{display:flex;background:var(--wash);border-radius:999px;padding:4px;margin:18px 18px 16px;
  position:sticky;top:64px;z-index:4}
.seg-btn{flex:1;padding:10px 0;border:none;border-radius:999px;background:transparent;font-family:inherit;
  font-size:13px;font-weight:700;color:var(--sub);cursor:pointer;transition:all .18s}
.seg-btn.on{background:var(--card);color:var(--ink);box-shadow:0 2px 8px rgba(32,29,24,.1)}
.tabpane{display:none;padding:0 18px}
.tabpane.on{display:block;animation:fadeIn .2s}

/* 캐러셀 */
.track{display:flex;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;
  scrollbar-width:none;padding:2px 2px 6px;margin:0 -2px}
.track::-webkit-scrollbar{display:none}
.slide{flex:0 0 100%;scroll-snap-align:center;min-width:0}
.dots{display:flex;gap:6px;justify-content:center;margin:10px 0 4px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--line);transition:all .2s}
.dot.on{width:18px;border-radius:99px;background:var(--ink)}

.cn-card{padding:22px 20px;min-height:230px;display:flex;flex-direction:column}
.cn-no{font-size:11px;font-weight:800;letter-spacing:.12em;color:var(--faint);margin-bottom:10px}
.cn-t{font-size:18px;font-weight:800;letter-spacing:-.015em;margin-bottom:10px;line-height:1.3}
.cn-b{font-size:14px;color:var(--sub);line-height:1.7}

/* 체크리스트 */
.ck-item{display:flex;align-items:flex-start;gap:11px;padding:13px 14px;border:1.5px solid var(--line);
  border-radius:var(--r-sm);margin-top:9px;cursor:pointer;transition:all .15s;font-size:13.5px;line-height:1.5}
.ck-box{width:21px;height:21px;border-radius:7px;border:1.5px solid var(--line);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:900;margin-top:1px}
.ck-item.done{background:var(--ok-bg);border-color:var(--ok)}
.ck-item.done .ck-box{background:var(--ok);border-color:var(--ok)}

/* 퀴즈 */
.q-card{padding:20px 18px}
.q-no{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.q-text{font-size:15px;font-weight:700;line-height:1.5;margin-bottom:14px;letter-spacing:-.01em}
.choice{display:flex;align-items:flex-start;gap:10px;padding:13px 14px;border:1.5px solid var(--line);
  border-radius:var(--r-sm);margin-top:8px;cursor:pointer;font-size:13.5px;line-height:1.5;transition:all .15s;background:var(--card)}
.choice .abc{font-weight:800;color:var(--faint);flex-shrink:0}
.choice.selected{border-color:var(--ink);background:#FAF8F3}
.choice.selected .abc{color:var(--ink)}
.choice.correct{border-color:var(--ok);background:var(--ok-bg)}
.choice.correct .abc{color:var(--ok)}
.choice.wrong{border-color:var(--bad);background:var(--bad-bg)}
.choice.wrong .abc{color:var(--bad)}
.choice.dim{opacity:.5;pointer-events:none}
.exp{margin-top:12px;padding:13px 14px;border-radius:var(--r-sm);background:var(--wash);
  font-size:13px;color:var(--sub);line-height:1.65;display:none}
.exp.show{display:block;animation:fadeIn .25s}
.exp b{color:var(--ink)}

/* 게이트 */
.gate-intro{padding:24px 20px;text-align:center}
.gate-rule{display:flex;gap:9px;text-align:left;font-size:13px;color:var(--sub);margin-top:9px;line-height:1.5}
.gate-foot{margin:18px 0 0;padding-top:16px;border-top:1px solid var(--line)}

/* 로딩 오버레이 */
.loading{position:fixed;inset:0;z-index:80;background:rgba(244,241,234,.92);backdrop-filter:blur(8px);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loading.show{display:flex}
.spin{width:38px;height:38px;border-radius:50%;border:3.5px solid var(--line);border-top-color:var(--ink);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* 바텀시트 */
.ovl{position:fixed;inset:0;z-index:90;background:rgba(32,29,24,.45);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s}
.ovl.show{opacity:1;pointer-events:auto}
.sheet{width:100%;max-width:430px;max-height:86vh;overflow-y:auto;background:var(--bg);
  border-radius:26px 26px 0 0;padding:10px 20px 28px;
  transform:translateY(100%);transition:transform .38s cubic-bezier(.22,.9,.3,1)}
.ovl.show .sheet{transform:translateY(0)}
.grab{width:40px;height:4px;border-radius:99px;background:var(--line);margin:6px auto 18px}

/* ---------- 자기진단 ---------- */
.sv-banner{padding:18px;border-radius:var(--r);background:var(--ink);color:#fff;margin-bottom:14px}
.sv-prog{position:sticky;top:10px;z-index:5;display:inline-flex;margin-bottom:12px;
  background:rgba(255,255,255,.85);backdrop-filter:blur(10px);border:1px solid var(--line);
  border-radius:999px;padding:7px 15px;font-size:12px;font-weight:800}
.sv-group{margin-bottom:18px}
.sv-item{padding:15px 15px 13px;margin-top:9px}
.sv-q{font-size:13.5px;font-weight:600;line-height:1.5;margin-bottom:11px}
.sv-opts{display:flex;gap:7px}
.sv-opt{flex:1;padding:9px 0;border:1.5px solid var(--line);border-radius:999px;background:var(--card);
  font-family:inherit;font-size:12px;font-weight:700;color:var(--sub);cursor:pointer;transition:all .15s}
.sv-opt.sel{color:#fff}
.bar-row{margin-top:14px}
.bar-track{height:8px;border-radius:99px;background:var(--wash);overflow:hidden;margin-top:6px}
.bar-fill{height:100%;border-radius:99px;transition:width .7s cubic-bezier(.22,.9,.3,1)}

/* ---------- 타임라인 ---------- */
.tl{position:relative;margin:6px 0 0 6px;padding-left:24px}
.tl::before{content:'';position:absolute;left:6px;top:8px;bottom:8px;width:2px;background:var(--line)}
.tl-item{position:relative;padding:11px 0}
.tl-dot{position:absolute;left:-24px;top:15px;width:14px;height:14px;border-radius:50%;
  background:var(--bg);border:2.5px solid var(--line)}
.tl-item.done .tl-dot{background:var(--ink);border-color:var(--ink)}
.tl-item.mile .tl-dot{width:16px;height:16px;left:-25px}
.tl-text{font-size:14px;font-weight:600}
.tl-item:not(.done) .tl-text{color:var(--faint);font-weight:500}
.tl-date{font-size:11px;color:var(--faint);margin-top:1px}
.tl-item.wait{opacity:.55}
.recert-card{margin-top:8px;padding:14px 15px}

/* 토스트 */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-80px);z-index:100;
  background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:11px 20px;border-radius:999px;
  box-shadow:0 10px 30px rgba(32,29,24,.3);transition:transform .3s cubic-bezier(.22,.9,.3,1);max-width:86%;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">

<!-- ================= 홈 ================= -->
<section class="screen active" id="s-home">
  <div class="home-top">
    <div>
      <div class="eyebrow">Team Player</div>
      <div class="h1" style="margin-top:5px">안녕하세요,<br>원철님 👋</div>
    </div>
    <span class="badge badge-line" id="home-date"></span>
  </div>

  <div class="hero">
    <div class="orb" style="width:150px;height:150px;background:var(--h);top:-50px;right:-30px"></div>
    <div class="orb" style="width:130px;height:130px;background:var(--g);bottom:-55px;left:-25px"></div>
    <div class="orb" style="width:110px;height:110px;background:var(--s);bottom:-40px;right:70px"></div>
    <div style="position:relative">
      <div class="eyebrow" style="color:rgba(255,255,255,.55)">이상적인 팀플레이어로 가는 길</div>
      <div style="display:flex;align-items:flex-end;gap:8px;margin-top:12px">
        <div class="hero-num" id="hero-done">0</div>
        <div style="font-size:15px;font-weight:700;color:rgba(255,255,255,.55);padding-bottom:7px">/ 7 모듈 완료</div>
      </div>
      <div class="hero-bar"><i id="hero-bar" style="width:0%"></i></div>
    </div>
  </div>

  <div class="vrow" id="home-vrow"><!-- 덕목별 스탯 (JS 렌더) --></div>

  <div class="card next-card" id="home-next" onclick="homeNextGo()"><!-- 이어서 학습 (JS 렌더) --></div>

  <div class="card next-card" id="home-diag" style="margin-top:10px" onclick="goTo('diag')">
    <div class="next-emoji" style="background:var(--wash)">🧭</div>
    <div style="flex:1">
      <div class="cap" id="home-diag-cap">학습 전 추천</div>
      <div style="font-size:14.5px;font-weight:700;margin-top:1px" id="home-diag-t">자기진단으로 시작하기</div>
    </div>
    <span class="chev">→</span>
  </div>

  <button class="reset-link" onclick="resetAll()">프로토타입 데이터 초기화</button>
</section>

<!-- ================= 모듈 목록 ================= -->
<section class="screen" id="s-modules">
  <div style="margin:6px 2px 20px;display:flex;justify-content:space-between;align-items:flex-end">
    <div>
      <div class="eyebrow">Modules</div>
      <div class="h1" style="margin-top:5px">학습 모듈</div>
    </div>
    <span class="badge badge-ink" id="mods-count">0 / 7 완료</span>
  </div>
  <div id="mods-list"><!-- JS 렌더 --></div>

  <div class="vsec">
    <div class="vsec-head">
      <div class="vsec-bar" style="background:var(--ink)"></div>
      <span class="h2">캡스톤</span>
    </div>
    <div class="card mod-card" id="capstone-card">
      <div class="mod-emoji" style="background:var(--wash)">🏅</div>
      <div class="mod-meta">
        <div class="mod-n">CAPSTONE</div>
        <div class="mod-t">세 덕목의 통합 인증</div>
        <div class="mod-state" id="capstone-state" style="color:var(--faint)">7개 모듈 완료 후 해제</div>
      </div>
    </div>
  </div>
</section>

<!-- ================= 모듈 상세 ================= -->
<section id="s-module">
  <div class="md-head">
    <button class="back-btn" onclick="goBackFromModule()">←</button>
    <div style="font-size:13px;font-weight:800" id="md-head-t"></div>
  </div>
  <div class="md-hero" id="md-hero"><!-- JS 렌더 --></div>
  <div class="card obj-card" id="md-obj"><!-- JS 렌더 --></div>

  <div class="seg" id="md-seg">
    <button class="seg-btn on" onclick="switchTab('read')">학습</button>
    <button class="seg-btn" onclick="switchTab('practice')">연습 퀴즈</button>
    <button class="seg-btn" onclick="switchTab('gate')">게이트</button>
  </div>

  <div class="tabpane on" id="tab-read"></div>
  <div class="tabpane" id="tab-practice"></div>
  <div class="tabpane" id="tab-gate"></div>
</section>

<!-- ================= 자기진단 ================= -->
<section class="screen" id="s-diag">
  <div style="margin:6px 2px 18px">
    <div class="eyebrow">Self Check</div>
    <div class="h1" style="margin-top:5px">자기진단</div>
  </div>
  <div id="diag-body"><!-- JS 렌더 (설문 or 결과) --></div>
</section>

<!-- ================= 나의 여정 ================= -->
<section class="screen" id="s-timeline">
  <div style="margin:6px 2px 18px">
    <div class="eyebrow">Journey</div>
    <div class="h1" style="margin-top:5px">나의 여정</div>
  </div>
  <div class="vrow" id="tl-vrow"></div>
  <div class="card" style="padding:20px 22px">
    <div class="tl" id="tl-list"></div>
  </div>
</section>

<!-- ================= 바텀 내비 ================= -->
<nav class="nav" id="nav">
  <div class="nav-item on" data-go="home" onclick="goTo('home')">
    <svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/><path d="M10 21v-6h4v6"/></svg>홈

/* ============================================================
   상태 — localStorage 영속 (프로토타입 전용, 실서비스 시 서버 API)
   ============================================================ */
const SKEY='tp2-state';
let state = {completed:{}, dates:{}, checks:{}, certifiedAt:null, recert:{}, recertDates:{}, diag:null, startDate:null, gateFails:{}};
function load(){ try{ const s=localStorage.getItem(SKEY); if(s) state={...state, ...JSON.parse(s)}; }catch(e){} if(!state.startDate){state.startDate=today(); save();} }
function save(){ try{ localStorage.setItem(SKEY, JSON.stringify(state)); }catch(e){} }
function today(){ const d=new Date(); return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; }
function doneCount(){ return MODS.filter((_,i)=>state.completed[i]).length; }
function vDone(vk){ return V[vk].mods.filter(i=>state.completed[i]).length; }
function isUnlocked(i){ return i===0 || !!state.completed[i-1]; } // 순차 개방 (기본값)
function nextModule(){ for(let i=0;i<MODS.length;i++){ if(!state.completed[i] && isUnlocked(i)) return i; } return null; }

function resetAll(){
  if(!confirm('프로토타입 데이터를 모두 초기화할까요?')) return;
  localStorage.removeItem(SKEY);
  state={completed:{},dates:{},checks:{},certifiedAt:null,recert:{},recertDates:{},diag:null,startDate:today(),gateFails:{}};
  save(); renderAll(); renderSurvey(); goTo('home'); toast('초기화했어요');
}

/* ============================================================
   라우터
   ============================================================ */
const SCREENS={home:'s-home',modules:'s-modules',diag:'s-diag',timeline:'s-timeline'};
function goTo(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(SCREENS[name]).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('on', n.dataset.go===name));
  window.scrollTo(0,0);
}
let cur=0;
function openModule(i){
  if(!isUnlocked(i)){ toast('이전 모듈을 먼저 완료해주세요'); return; }
  cur=i; renderModule();
  document.getElementById('s-module').classList.add('in');
  document.getElementById('s-module').scrollTo(0,0);
}
function goBackFromModule(){ document.getElementById('s-module').classList.remove('in'); }
function switchTab(t){
  document.querySelectorAll('#md-seg .seg-btn').forEach((b,bi)=>b.classList.toggle('on',['read','practice','gate'][bi]===t));
  ['read','practice','gate'].forEach(k=>document.getElementById('tab-'+k).classList.toggle('on',k===t));
}

/* ============================================================
   토스트 / 캐러셀 헬퍼
   ============================================================ */
let toastT=null;
function toast(msg){
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2200);
}
function syncDots(trackId,dotsId){
  const tr=document.getElementById(trackId), dots=document.getElementById(dotsId);
  if(!tr||!dots) return;
  tr.onscroll=()=>{
    const i=Math.round(tr.scrollLeft/tr.clientWidth);
    [...dots.children].forEach((d,di)=>d.classList.toggle('on',di===i));
  };
}
function trackGoTo(trackId,i){
  const tr=document.getElementById(trackId);
  tr.scrollTo({left:i*tr.clientWidth,behavior:'smooth'});
}

function pickPQ(qi,ai){
  if(pqAns[qi]!==undefined) return;
  pqAns[qi]=ai;
  const q=MODS[cur].pq[qi], box=document.getElementById('pq-ch-'+qi);
  [...box.children].forEach((c,ci)=>{
    c.classList.add('dim');
    if(ci===q.ans) c.classList.replace('dim','correct')||c.classList.add('correct');
    if(ci===ai && ai!==q.ans) c.classList.remove('dim'),c.classList.add('wrong');
    if(ci===q.ans) c.classList.remove('dim');
  });
  const exp=document.getElementById('pq-exp-'+qi);
  exp.innerHTML=(ai===q.ans?'<b style="color:var(--ok)">정답이에요!</b> ':'<b style="color:var(--bad)">아쉬워요.</b> 정답은 <b>'+'ABCD'[q.ans]+'</b>. ')+q.exp;
  exp.classList.add('show');
  document.getElementById('pq-next-'+qi).style.display='block';
}

function pickGate(qi,ai){
  gAns[qi]=ai;
  const box=document.getElementById('gq-ch-'+qi);
  [...box.children].forEach((c,ci)=>c.classList.toggle('selected',ci===ai));
  const b=document.getElementById('gq-b-'+qi);
  b.textContent='✓ 선택됨'; b.className='badge'; b.style.background='var(--ok-bg)'; b.style.color='var(--ok)';
}
function submitGate(){
  const m=MODS[cur];
  const missing=m.gq.findIndex((_,i)=>gAns[i]===undefined);
  if(missing>=0){ toast(`문항 ${missing+1}번을 선택해주세요`); trackGoTo('gq-track',missing+1); return; }
  document.getElementById('gate-loading').classList.add('show');
  const saved={...gAns};
  setTimeout(()=>{
    document.getElementById('gate-loading').classList.remove('show');
    const score=m.gq.filter((q,i)=>saved[i]===q.ans).length;
    const pass=score>=GATE_PASS;
    if(pass) completeModule(cur);
    else { state.gateFails[cur]=(state.gateFails[cur]||0)+1; save(); }
    showGateSheet(score,m.gq.length,pass,saved);
  },1500);
}

    {main:'학습에 어려움이 있으신가요? 자료를 한번 더 읽어보고 재도전 해봐요.',sub:'3회 실패 시 멘토에게 도움 메시지가 자동 발송될 예정입니다.'},
    {main:'멘토와 함께 이 난관을 해쳐나가 보아요. 멘토에게 도움의 메시지가 자동 발송됩니다.',sub:null},
  ];
  const fm=!pass?failMsgs[Math.min(failCount,3)-1]:null;
  const wrong=m.gq.map((q,i)=>saved[i]!==q.ans
    ?`<div style="background:var(--bad-bg);border:1px solid #F3C8C8;border-radius:var(--r-sm);padding:11px 13px;margin-top:7px;font-size:12.5px;line-height:1.5">
       <b>문항 ${i+1}</b> — ${q.q}<br><span style="color:var(--ok);font-weight:700">정답: ${'ABCD'[q.ans]}. ${q.opts[q.ans]}</span></div>`:'').join('');
  document.getElementById('gate-sheet').innerHTML=`
    <div class="grab"></div>
    <div style="text-align:center;padding:6px 0 18px">
      <div style="font-size:54px;font-weight:900;letter-spacing:-.03em;color:${pass?'var(--ok)':'var(--bad)'};line-height:1">${score}</div>
      <div style="font-size:15px;color:var(--faint);font-weight:700;margin-top:3px">/ ${total} 정답</div>
      <div style="font-size:16px;font-weight:800;margin-top:12px">${pass?'모든 개념을 이해했습니다!':'조금 더 확인해볼까요'}</div>
      ${pass?`<div style="margin-top:13px;padding:14px 16px;background:var(--ok-bg);border:1px solid #BFE8CC;border-radius:var(--r-sm);font-size:13px;color:var(--s-dark);line-height:1.6;text-align:left">
        ${v.label}을(를) 향한 한 걸음을 내디뎠어요.<br>${m.title} 모듈이 완료 처리되었습니다.</div>`:''}
      ${fm?`<div style="margin-top:14px;padding:16px;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:var(--r-sm);text-align:center;line-height:1.45">
        <div style="font-size:15px;font-weight:700;color:var(--ink)">${fm.main}</div>
        ${fm.sub?`<div style="font-size:11.5px;color:var(--faint);margin-top:7px">(${fm.sub})</div>`:''}
      </div>`:''}
    </div>
    ${!pass&&wrong?`<div style="margin-bottom:16px"><div class="cap" style="letter-spacing:.06em;margin-bottom:2px">틀린 문항</div>${wrong}</div>`:''}
    <div style="display:flex;flex-direction:column;gap:8px">
      ${pass
        ?(nx!==null
          ?`<button class="btn btn-ink" onclick="closeGateSheet();goBackFromModule();setTimeout(()=>openModule(${nx}),320)">다음 모듈로 →</button>`
          :`<button class="btn btn-ink" onclick="closeGateSheet();goBackFromModule();goTo('timeline')">나의 여정 보기 →</button>`)
        :`<button class="btn btn-ink" onclick="closeGateSheet();retryGate()">다시 도전하기</button>`}
      <button class="btn btn-ghost" onclick="closeGateSheet();switchTab('read')">학습 내용 다시 보기</button>
    </div>`;
  document.getElementById('gate-ovl').classList.add('show');
  if(pass) setTimeout(launchConfetti, 200);
}
function closeGateSheet(e){ if(e&&e.target.id!=='gate-ovl'&&e.type==='click'&&e.currentTarget.id==='gate-ovl'&&e.target!==e.currentTarget)return; document.getElementById('gate-ovl').classList.remove('show'); }
function retryGate(){ renderGate(); trackGoTo('gq-track',0); }

function launchConfetti(){
  const canvas=document.createElement('canvas');
  canvas.style.cssText='position:fixed;inset:0;z-index:999;pointer-events:none';
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  document.body.appendChild(canvas);
  const ctx=canvas.getContext('2d');
  const COLORS=['#F59E0B','#2563EB','#16A34A','#EF4444','#EC4899','#8B5CF6','#fff'];
  const pieces=Array.from({length:120},()=>({
    x:Math.random()*canvas.width,
    y:-10-Math.random()*canvas.height*0.4,
    w:7+Math.random()*6, h:4+Math.random()*4,
    r:Math.random()*Math.PI*2,
    vx:(Math.random()-0.5)*3,
    vy:2.5+Math.random()*3,
    vr:(Math.random()-0.5)*0.18,
    color:COLORS[Math.floor(Math.random()*COLORS.length)],
    opacity:1
  }));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.r+=p.vr;
      if(frame>90) p.opacity=Math.max(0,p.opacity-0.018);
      ctx.save();
      ctx.globalAlpha=p.opacity;
      ctx.translate(p.x,p.y);
      ctx.rotate(p.r);
      ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    frame++;
    if(frame<160) requestAnimationFrame(draw);
    else canvas.remove();
  }
  draw();
}

function completeModule(i){
  state.completed[i]=true; state.dates[i]=today();
  if(doneCount()===7 && !state.certifiedAt) state.certifiedAt=today();
  save(); renderAll();
}

   ============================================================ */
let svAns={};
function renderSurvey(){
  svAns={};
  let idx=0;
  document.getElementById('diag-body').innerHTML=`
    <div class="sv-banner">
      <div style="font-size:15px;font-weight:800;margin-bottom:5px">지금의 나를 확인하는 18문항</div>
      <div style="font-size:12.5px;color:rgba(255,255,255,.6);line-height:1.6">현황 확인 도구입니다. 정답이 없으니 솔직하게 응답해주세요. 결과는 학습 추천에만 사용됩니다.</div>
    </div>
    <div class="sv-prog" id="sv-prog">0 / 18 완료</div>
    ${Object.entries(V).map(([vk,v])=>`
      <div class="sv-group">
        <div class="vsec-head"><div class="vsec-bar" style="background:${v.color}"></div>
          <span class="h2">${v.label}</span><span class="cap">${v.en} · 6문항</span></div>
        ${SURVEY[vk].map(q=>{
          const k='q'+(idx++);

            <div class="sv-opts">${SCALE.map(s=>`
              <button class="sv-opt" id="${k}-${s.v}" onclick="pickSv('${k}',${s.v},'${vk}')">${s.t}</button>`).join('')}</div></div>`;
        }).join('')}

    <button class="btn btn-ink" onclick="submitDiag()">결과 보기</button>`;
}
function pickSv(k,val,vk){
  svAns[k]={val,vk};
  SCALE.forEach(s=>{
    const b=document.getElementById(k+'-'+s.v);
    const on=s.v===val;
    b.classList.toggle('sel',on);
    b.style.background=on?V[vk].color:'var(--card)';
    b.style.borderColor=on?V[vk].color:'var(--line)';
    b.style.color=on?'#fff':'var(--sub)';
  });
  document.getElementById('sv-prog').textContent=Object.keys(svAns).length+' / 18 완료';
}
function submitDiag(){
  const n=Object.keys(svAns).length;
  if(n<18){ toast(`모든 항목(${n}/18)을 선택해주세요`); return; }
  const sc={h:0,g:0,s:0};
  Object.values(svAns).forEach(a=>sc[a.vk]+=a.val);
  const focus=Object.entries(sc).sort((a,b)=>a[1]-b[1])[0][0];
  state.diag={...sc,focus,date:today()}; save();
  renderDiagResult(); renderHome(); window.scrollTo(0,0);
}

      <div class="cap">지금 이 순간의 스냅샷입니다 · ${d.date}</div>

            <span style="color:${v.color}">${v.label}</span><span>${d[vk]} / 18</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${d[vk]/18*100}%;background:${v.color}"></div></div>

      <div style="font-size:13px;color:${fv.dark};opacity:.8;margin-top:6px;line-height:1.6">점수가 낮다는 건 부족하다는 뜻이 아니라, 가장 크게 성장할 수 있는 영역이라는 뜻이에요.</div>

  else goTo('modules');
}

/* ============================================================
   나의 여정 (타임라인)
   ============================================================ */
function renderTimeline(){
  document.getElementById('tl-vrow').innerHTML=Object.entries(V).map(([vk,v])=>{
    const d=vDone(vk),t=v.mods.length;
    return `<div class="vstat"><div class="cap" style="color:${v.color}">${v.label}</div>
      <div class="n">${d}<span style="font-size:13px;color:var(--faint);font-weight:700"> / ${t}</span></div>
      <div class="bar"><i style="width:${d/t*100}%;background:${v.color}"></i></div></div>`;
  }).join('');

  const items=[];
  items.push({t:'여정 시작',done:true,date:state.startDate});
  Object.entries(V).forEach(([vk,v])=>{
    v.mods.forEach(i=>items.push({t:`${MODS[i].n} ${MODS[i].title}`,done:!!state.completed[i],date:state.dates[i]}));
    const vd=v.mods.every(i=>state.completed[i]);
    items.push({t:`🎯 ${v.label} 완성`,done:vd,date:vd?state.dates[v.mods[v.mods.length-1]]:null,mile:true});
  });
  const cap=doneCount()===7;
  items.push({t:'🏅 캡스톤 인증',done:cap,date:state.certifiedAt,mile:true});

  let html=items.map(it=>`
    <div class="tl-item ${it.done?'done':''} ${it.mile?'mile':''}">
      <div class="tl-dot" ${it.mile&&it.done?'style="background:var(--ink)"':''}></div>
      <div class="tl-text" ${it.mile?'style="font-weight:800"':''}>${it.t}</div>
      ${it.date?`<div class="tl-date">${it.date}</div>`:''}
    </div>`).join('');

  // 착근기 — 인증 후 활성 (프로토타입: 즉시 활성, 실서비스: certifiedAt+7/+21 스케줄러)
  [7,21].forEach(day=>{
    const done=!!state.recert[day];
    const ready=cap && (day===7 || !!state.recert[7]);
    html+=`<div class="tl-item ${done?'done':''} ${!ready&&!done?'wait':''}">
      <div class="tl-dot" ${!ready&&!done?'style="border-style:dashed"':''}></div>
      <div class="tl-text">Day+${day} 재인증 <span class="cap">· ${day===7?'1차 확인':'2차 습관 안착'}</span></div>
      ${done?`<div class="tl-date">${state.recertDates[day]}</div>`
        :ready?`<div class="card recert-card">
          <div style="font-size:12.5px;color:var(--sub);margin-bottom:10px">인증 후 ${day}일이 지났어요. 배운 것이 남아있는지 확인해볼까요? <span class="cap">(데모: 즉시 활성화)</span></div>
          <button class="btn btn-ink btn-sm" onclick="openRecert(${day})">재인증 시작하기 →</button></div>`
        :`<div class="tl-date">캡스톤 인증 ${day}일 후 활성화</div>`}
    </div>`;
  });
  document.getElementById('tl-list').innerHTML=html;
}

/* ---- 재인증 바텀시트 ---- */
let rcAns={},rcChecks=[];
function openRecert(day){
  rcAns={};rcChecks=[];
  const r=RECERT[day];
  document.getElementById('recert-sheet').innerHTML=`
    <div class="grab"></div>
    <div style="padding-bottom:4px">
      <div class="h2">${r.title}</div>
      <div class="cap" style="margin:3px 0 16px">${r.sub}</div>
      ${r.qs.map((q,qi)=>`
        <div class="card q-card" style="margin-bottom:12px">
          <div class="q-no"><span class="badge badge-ink">문항 ${qi+1}</span>
            ${q.ans===null?'<span class="badge badge-line">자기보고</span>':''}</div>
          <div class="q-text" style="font-size:14px">${q.q}</div>
          <div id="rc-ch-${qi}">${q.opts.map((o,ai)=>`
            <div class="choice" onclick="pickRecert(${day},${qi},${ai})"><span class="abc">${'ABCD'[ai]}</span><span>${o}</span></div>`).join('')}</div>
        </div>`).join('')}
      <div class="card" style="padding:16px;margin-bottom:16px">
        <div class="h2" style="font-size:14px;margin-bottom:4px">실천 체크리스트</div>
        ${r.practice.map((p,i)=>`<div class="ck-item" id="rc-ck-${i}" onclick="toggleRecertCheck(${i})">
          <div class="ck-box"></div><span>${p}</span></div>`).join('')}
      </div>
      <button class="btn btn-ink" onclick="submitRecert(${day})">재인증 완료하기</button>
    </div>`;
  document.getElementById('recert-ovl').classList.add('show');
}
function pickRecert(day,qi,ai){
  if(rcAns[qi]!==undefined) return;
  rcAns[qi]=ai;
  const q=RECERT[day].qs[qi], box=document.getElementById('rc-ch-'+qi);
  [...box.children].forEach((c,ci)=>{
    if(q.ans===null){ c.classList.toggle('selected',ci===ai); c.classList.add('dim'); if(ci===ai)c.classList.remove('dim'); }
    else{
      c.classList.add('dim');
      if(ci===q.ans){c.classList.remove('dim');c.classList.add('correct');}
      if(ci===ai&&ai!==q.ans){c.classList.remove('dim');c.classList.add('wrong');}
    }
  });
}
function toggleRecertCheck(i){
  const el=document.getElementById('rc-ck-'+i);
  if(rcChecks.includes(i)){rcChecks=rcChecks.filter(x=>x!==i);el.classList.remove('done');el.querySelector('.ck-box').textContent='';}
  else{rcChecks.push(i);el.classList.add('done');el.querySelector('.ck-box').textContent='✓';}
}
function submitRecert(day){
  const r=RECERT[day];
  if(Object.keys(rcAns).length<r.qs.length){ toast('모든 문항을 선택해주세요'); return; }
  state.recert[day]=true; state.recertDates[day]=today(); save();
  document.getElementById('recert-sheet').innerHTML=`
    <div class="grab"></div>
    <div style="text-align:center;padding:28px 0 10px">
      <div style="font-size:44px;margin-bottom:12px">${day===7?'🌿':'🌳'}</div>
      <div class="h2">Day+${day} 재인증 완료!</div>
      <div style="font-size:13px;color:var(--sub);margin:8px 0 22px;line-height:1.6">
        ${day===7?'배움이 잘 남아있네요. 2주 뒤 마지막 확인에서 만나요.':'세 덕목이 습관으로 자리잡았어요.<br>이제 인증은 출발선이 됩니다.'}</div>
      <button class="btn btn-ink" onclick="closeRecertSheet();renderTimeline()">여정으로 돌아가기</button>
    </div>`;
}
function closeRecertSheet(e){ if(e&&e.target!==e.currentTarget)return; document.getElementById('recert-ovl').classList.remove('show'); renderTimeline(); }

/* ============================================================
   init
   ============================================================ */
function renderAll(){ renderHome(); renderModules(); renderTimeline(); }
load();
renderAll();
if(state.diag) renderDiagResult(); else renderSurvey();
</script>
