<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 720" font-family="Noto Sans CJK KR, Malgun Gothic, sans-serif">
<defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<path d="M0,0 L8,3 L0,6 Z" fill="#44546A"/></marker></defs>
<rect width="1040" height="720" fill="#FFFFFF"/>
<rect width="1040" height="60" fill="#1F3864"/>
<text x="30" y="38" fill="#FFFFFF" font-size="24" font-weight="700">게이트 자동 판정 흐름 (Power Automate)</text>
<text x="1010" y="37" fill="#C9D3E6" font-size="13" text-anchor="end">폼 제출 → 점수 계산 → 합/불 분기 → 기록·안내</text>
<rect x="120.0" y="88" width="360" height="64" rx="10" fill="#F2F4F8" stroke="#2E7D5B" stroke-width="1.5"/>
<text x="300" y="114" fill="#222222" font-size="14.5" font-weight="700" text-anchor="middle">① 트리거: Forms ‘응답이 제출되면’</text>
<text x="300" y="134" fill="#44546A" font-size="12" font-weight="400" text-anchor="middle">게이트/인증 폼에 연결</text>
<line x1="300" y1="152" x2="300" y2="170" stroke="#44546A" stroke-width="2" marker-end="url(#arr)"/>
<rect x="120.0" y="170" width="360" height="56" rx="10" fill="#F2F4F8" stroke="#1F3864" stroke-width="1.5"/>
<text x="300" y="196" fill="#222222" font-size="14.5" font-weight="700" text-anchor="middle">② ‘응답 세부 정보 가져오기’</text>
<text x="300" y="216" fill="#44546A" font-size="12" font-weight="400" text-anchor="middle">제출된 답안 불러오기</text>
<line x1="300" y1="226" x2="300" y2="244" stroke="#44546A" stroke-width="2" marker-end="url(#arr)"/>
<rect x="120.0" y="244" width="360" height="60" rx="10" fill="#F2F4F8" stroke="#1F3864" stroke-width="1.5"/>
<text x="300" y="270" fill="#222222" font-size="14.5" font-weight="700" text-anchor="middle">③ 점수 계산</text>
<text x="300" y="290" fill="#44546A" font-size="12" font-weight="400" text-anchor="middle">정답 수 / 문항 수 = 정답률 (Forms 점수 사용 가능)</text>
<line x1="300" y1="304" x2="300" y2="322" stroke="#44546A" stroke-width="2" marker-end="url(#arr)"/>
<polygon points="300,322 450.0,382.0 300,442 150.0,382.0" fill="#FBF4E6" stroke="#B8943F" stroke-width="1.8"/>
<text x="300" y="374.0" fill="#222222" font-size="14" font-weight="700" text-anchor="middle">④ 통과 기준 충족?</text>
<text x="300" y="396.0" fill="#44546A" font-size="12" font-weight="400" text-anchor="middle">핵심=100% · 일반=80%</text>
<line x1="150.0" y1="382.0" x2="120" y2="382.0" stroke="#44546A" stroke-width="2"/>
<line x1="120" y1="382.0" x2="120" y2="466" stroke="#44546A" stroke-width="2" marker-end="url(#arr)"/>
<text x="150" y="374.0" fill="#B5343B" font-size="12" font-weight="700" text-anchor="start">아니오</text>
<line x1="450.0" y1="382.0" x2="480" y2="382.0" stroke="#44546A" stroke-width="2"/>
<line x1="480" y1="382.0" x2="480" y2="466" stroke="#44546A" stroke-width="2" marker-end="url(#arr)"/>
<text x="430" y="374.0" fill="#2E7D5B" font-size="12" font-weight="700" text-anchor="start">예</text>
<rect x="20" y="466" width="260" height="84" rx="10" fill="#FBEFEF" stroke="#B5343B" stroke-width="1.4"/>
<text x="150" y="494" fill="#B5343B" font-size="13.5" font-weight="700" text-anchor="middle">⑤-불합격</text>
<text x="150" y="516" fill="#222222" font-size="12" font-weight="400" text-anchor="middle">재시도 안내(다른 변형) · 기록</text>
<rect x="350" y="466" width="300" height="84" rx="10" fill="#EFF4F1" stroke="#2E7D5B" stroke-width="1.4"/>
<text x="500" y="494" fill="#2E7D5B" font-size="13.5" font-weight="700" text-anchor="middle">⑤-합격</text>
<text x="500" y="516" fill="#222222" font-size="12" font-weight="400" text-anchor="middle">Lists에 통과 기록 + 합격 안내(메일/Teams)</text>
<rect x="700" y="160" width="320" height="210" rx="12" fill="#F2F4F8" stroke="#B8943F" stroke-width="1.3"/>
<text x="720" y="192" fill="#B8943F" font-size="15" font-weight="700" text-anchor="start">윤리 게이트(병행)</text>
<text x="720" y="224" fill="#222222" font-size="12.5" font-weight="400" text-anchor="start">응답이 타인을 낙인하거나</text>
<text x="720" y="244" fill="#222222" font-size="12.5" font-weight="400" text-anchor="start">아마추어 심리분석·비하로</text>
<text x="720" y="264" fill="#222222" font-size="12.5" font-weight="400" text-anchor="start">흐르면 점수와 무관하게</text>
<text x="720" y="284" fill="#222222" font-size="12.5" font-weight="400" text-anchor="start">‘재시도’로 보낸다.</text>
<text x="720" y="304" fill="#222222" font-size="12.5" font-weight="400" text-anchor="start"></text>
<text x="720" y="324" fill="#222222" font-size="12.5" font-weight="400" text-anchor="start">자동 키워드 점검 +</text>
<text x="720" y="344" fill="#222222" font-size="12.5" font-weight="400" text-anchor="start">핵심·인증은 담당자 수동 확인.</text>
<text x="720" y="364" fill="#222222" font-size="12.5" font-weight="400" text-anchor="start">사람의 ‘겸손/인성 점수’는</text>
<text x="720" y="384" fill="#222222" font-size="12.5" font-weight="400" text-anchor="start">만들지 않는다.</text>
</svg>