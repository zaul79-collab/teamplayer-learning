<text x="54" y="700" fill="#44546A" font-size="14" font-weight="400" text-anchor="start">· 영리함 = 대인관계 영리함(타인에 대한 상식). 지적 능력(IQ)이 아니다.</text>
<text x="54" y="722" fill="#44546A" font-size="14" font-weight="400" text-anchor="start">· 세 덕목 중 겸손이 가장 근본. 갈망+영리함이되 겸손이 없으면 '노련한 정치가'로 가장 위험해진다.</text>
